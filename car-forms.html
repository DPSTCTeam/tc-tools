<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CAR Form Quick Reference</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --blue: #1c7cad;
    --text: #1a1a1a;
    --text-secondary: #5a6472;
    --text-muted: #8a9099;
    --border: #e2e6ea;
    --bg: #f5f7f9;
    --surface: #ffffff;
    --radius: 10px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; position: sticky; top: 0; z-index: 100; }
  .brand-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--blue); display: inline-block; margin-right: 8px; }
  .brand-name { font-size: 15px; font-weight: 600; }
  .brand-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .back-link { font-size: 13px; color: var(--blue); text-decoration: none; }
  .back-link:hover { text-decoration: underline; }
  .page-hero { background: linear-gradient(135deg, #1c7cad 0%, #155f87 100%); color: white; padding: 2.5rem 2rem 2rem; }
  .hero-title { font-size: 26px; font-weight: 600; margin-bottom: 6px; }
  .hero-sub { font-size: 14px; opacity: 0.8; }
  .controls { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1; min-width: 220px; }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
  .search-wrap input { width: 100%; padding: 9px 12px 9px 36px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: var(--font); background: var(--bg); color: var(--text); outline: none; }
  .search-wrap input:focus { border-color: var(--blue); background: white; }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill { font-size: 12px; padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text-secondary); cursor: pointer; transition: all 0.15s; font-family: var(--font); }
  .pill:hover { border-color: var(--blue); color: var(--blue); }
  .pill.active { background: var(--blue); border-color: var(--blue); color: white; }
  .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }
  .stats { font-size: 12px; color: var(--text-muted); margin-bottom: 1rem; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; transition: box-shadow 0.15s, border-color 0.15s; }
  .form-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); border-color: #cbd1d8; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
  .form-code { font-size: 13px; font-weight: 500; color: var(--blue); font-family: var(--mono); }
  .cat-badge { font-size: 11px; padding: 3px 9px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; font-weight: 500; }
  .form-name { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
  .form-desc { font-size: 12px; color: var(--text-secondary); line-height: 1.55; margin-bottom: 10px; }
  .when-label { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 3px; }
  .when-text { font-size: 12px; color: var(--text-secondary); line-height: 1.4; }
  .required-tag { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 4px; margin-top: 8px; font-weight: 600; }
  .req-yes { background: #e6f4ea; color: #2e7d32; }
  .req-no { background: #f1f3f5; color: #6b7380; }
  .no-results { grid-column: 1/-1; text-align: center; padding: 4rem 1rem; color: var(--text-muted); font-size: 14px; }
  @media print {
    header { position: static; box-shadow: none; }
    .controls { display: none; }
    .page-hero { background: #1c7cad !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .form-card { break-inside: avoid; box-shadow: none !important; border: 1px solid #ccc !important; }
    .cat-badge { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .req-yes, .req-no { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .form-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .container { padding: 1rem; }
  }
  @media (max-width: 600px) { header { padding: 1rem; } .page-hero { padding: 1.5rem 1rem; } .controls { padding: 0.75rem 1rem; } .container { padding: 1rem; } .form-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <div>
    <span class="brand-dot"></span>
    <span class="brand-name">TC Agent Tools</span>
    <div class="brand-sub" style="margin-left:18px;">CAR Form Quick Reference</div>
  </div>
  <a href="index.html" class="back-link">&#8592; Back to tools</a>
</header>

<div class="page-hero">
  <div class="hero-title">CAR Form Quick Reference</div>
  <div class="hero-sub">Search by form name, code, or situation — find the right form fast.</div>
</div>

<div class="controls">
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="search" placeholder="Search by form name, code, or situation..." />
  </div>
  <div class="filter-row" id="filters"></div>
  <button onclick="window.print()" class="pill" style="margin-left:auto;white-space:nowrap;">🖨️ Print</button>
</div>

<div class="container">
  <div class="stats" id="stats"></div>
  <div class="form-grid" id="grid"></div>
</div>

<script>
const FORMS = [
  // PURCHASE
  { code:"RPA",     name:"Residential Purchase Agreement",                      cat:"Purchase",     desc:"The primary contract for residential home purchases in California. Covers price, terms, contingencies, and closing conditions.", when:"Every residential purchase transaction — this is the foundation document.", required:true },
  { code:"RIPA",    name:"Residential Income Purchase Agreement",                cat:"Purchase",     desc:"Used for 2–4 unit residential income properties. Similar to RPA but adapted for income-generating properties.", when:"Purchasing duplexes, triplexes, or fourplexes.", required:true },
  { code:"VLPA",    name:"Vacant Land Purchase Agreement",                       cat:"Purchase",     desc:"Purchase agreement specifically for unimproved land. Addresses zoning, soil, utilities, and entitlement contingencies.", when:"Any purchase of raw or vacant land.", required:true },

  // NEGOTIATION
  { code:"SCO",     name:"Seller Counter Offer",                                 cat:"Negotiation",  desc:"Seller's formal counter offer to a buyer's initial offer or counter. Can modify any terms of the RPA.", when:"Seller wants to negotiate price, terms, or conditions from the buyer's offer.", required:false },
  { code:"BCO",     name:"Buyer Counter Offer",                                  cat:"Negotiation",  desc:"Buyer's formal counter offer in response to a seller counter offer. Used to continue negotiation of terms.", when:"Buyer is responding to a seller counter offer with modified terms.", required:false },
  { code:"SMCO",    name:"Seller Multiple Counter Offer",                        cat:"Negotiation",  desc:"Used when a seller issues counter offers to multiple buyers simultaneously. Each buyer must sign the SMCO selection form for their counter to become binding.", when:"Multiple offer situations where seller counters more than one buyer at the same time.", required:false },
  { code:"AEA",     name:"Amendment of Existing Agreement Terms",                 cat:"Addendum",     desc:"Used to formally amend or modify terms that have already been agreed upon in an executed contract — such as changing the COE date, purchase price, or other settled terms. Different from an addendum, which adds new terms.", when:"Any time parties mutually agree to change a term that was already agreed upon in the executed contract.", required:false },

  // CONTINGENCY
  { code:"COP",     name:"Contingency of Purchase",                              cat:"Contingency",  desc:"Allows buyer's offer to be contingent on the purchase or close of another property. Seller retains the right to accept other offers and issue a notice to perform.", when:"Buyer needs to close on another property before or concurrently with this transaction.", required:false },
  { code:"CR",      name:"Contingency Removal",                                  cat:"Contingency",  desc:"Formally removes one or more contingencies from the contract — inspection, loan, appraisal, or other.", when:"After buyer satisfies or elects to waive a contingency.", required:false },
  { code:"NBP",     name:"Notice to Buyer to Perform",                           cat:"Contingency",  desc:"Seller's notice giving buyer a 48-hour deadline to remove contingencies or take a required contractual action.", when:"Buyer has not removed contingencies by the deadline. Precedes cancellation.", required:false },
  { code:"NSP",     name:"Notice to Seller to Perform",                          cat:"Contingency",  desc:"Buyer's notice giving seller a 48-hour deadline to perform a required obligation such as delivering disclosures.", when:"Seller has not fulfilled a contractual obligation on time.", required:false },

  // DISCLOSURE
  { code:"TDS",     name:"Transfer Disclosure Statement",                        cat:"Disclosure",   desc:"Seller's mandatory disclosure of known property defects and conditions. One of the most legally significant forms in CA real estate.", when:"Required on virtually all 1–4 unit residential property sales.", required:true },
  { code:"SPQ",     name:"Seller Property Questionnaire",                        cat:"Disclosure",   desc:"Supplements the TDS with detailed questions about the property's systems, history, and condition.", when:"Used alongside the TDS on residential sales. Standard practice.", required:false },
  { code:"AVID",    name:"Agent Visual Inspection Disclosure",                   cat:"Disclosure",   desc:"Agent's written disclosure of visually observable defects noted during a walkthrough. Required of both listing and buyer's agents.", when:"Both agents complete this after a property inspection/walkthrough.", required:true },
  { code:"SBSA",    name:"Statewide Buyer and Seller Advisory",                  cat:"Disclosure",   desc:"Comprehensive advisory covering environmental hazards, legal concerns, market conditions, and buyer/seller rights.", when:"All residential transactions. Typically provided at or before acceptance.", required:false },
  { code:"ESD",     name:"Exempt Seller Disclosure",                             cat:"Disclosure",   desc:"Used when the seller is exempt from completing the TDS — such as in REO/bank-owned sales, probate, or certain trust sales. Notifies buyer that standard seller disclosures will not be provided.", when:"Seller is exempt from TDS requirements: REO, probate, inter-family transfer, or court-ordered sale.", required:false },
  { code:"SOLAR",   name:"Solar Disclosure and Advisory",                        cat:"Disclosure",   desc:"Discloses the presence of a solar energy system on the property, including whether it is owned or leased, transfer requirements, and any remaining loan or PPA obligations.", when:"Property has a solar system — especially critical if it is leased or subject to a power purchase agreement that must transfer to the buyer.", required:false },
  { code:"SWPI",    name:"Septic, Well, Property Monument, and Cost Allocation Addendum", cat:"Addendum",    desc:"Addresses inspections and cost allocation for septic systems, well water, and property monument surveys. Specifies who is responsible for inspections, repairs, and any required work.", when:"Property has a septic system, well water, or boundary monument issues that need to be addressed as part of the transaction.", required:false },

  // INSPECTION
  { code:"RR",      name:"Request for Repair",                                   cat:"Inspection",   desc:"Buyer's formal written request for repairs, credits, or price reductions following a property inspection.", when:"After inspection, if buyer wants the seller to address findings.", required:false },
  { code:"RRRR",    name:"Response to Request for Repair",                       cat:"Inspection",   desc:"Seller's formal written response to a repair request — accepting, rejecting, or negotiating terms.", when:"After receiving a buyer's RR form.", required:false },
  { code:"SPRP",    name:"Seller's Purchase of Replacement Property",             cat:"Contingency",  desc:"Makes the seller's obligation to complete the sale contingent on their ability to find and secure a replacement property. Protects the seller from being displaced without a place to go.", when:"Seller needs to locate and go into contract on a replacement property before or concurrently with closing this sale.", required:false },

  // AGENCY
  { code:"AD",      name:"Agency Disclosure",                                    cat:"Agency",       desc:"Explains buyer and seller representation relationships. Both parties must acknowledge receipt.", when:"Required at first substantive contact. Must be signed before making or accepting an offer.", required:true },
  { code:"PRBS",    name:"Possible Representation of Both Buyer and Seller",     cat:"Agency",       desc:"Disclosure that the agent or brokerage may represent both buyer and seller in the same transaction (dual agency).", when:"Agent is showing their own listing to a buyer they also represent.", required:true },
  { code:"BRBC",    name:"Buyer Representation and Broker Compensation Agreement", cat:"Agency",     desc:"Required post-NAR settlement agreement establishing the scope of buyer representation and terms of buyer's broker compensation. Must be signed before showing property.", when:"Required before showing any property to a buyer. Mandatory since August 2024 per NAR settlement.", required:true },

  // LISTING
  { code:"RLA",     name:"Residential Listing Agreement — Exclusive Right to Sell", cat:"Listing",  desc:"The standard listing agreement granting broker the exclusive right to sell. Commission is earned regardless of who procures the buyer.", when:"Listing a residential property for sale with full MLS marketing.", required:true },

  // ADDENDUM
  { code:"ADM",     name:"Addendum",                                             cat:"Addendum",     desc:"General-purpose addendum to add terms, conditions, or provisions not covered elsewhere in the primary contract.", when:"Any time additional terms need to be incorporated into the agreement.", required:false },
  { code:"ADM-GEN", name:"General Addendum",                                     cat:"Addendum",     desc:"A blank general addendum for adding custom terms, conditions, or agreements not covered by a standard CAR form.", when:"Custom terms are needed that don't fit an existing CAR addendum.", required:false },
  { code:"TOPA",    name:"Tenant Occupied Property Addendum",                    cat:"Addendum",     desc:"Addresses rights and obligations when purchasing a tenant-occupied property, including existing lease terms, right of entry for inspections, and tenant cooperation.", when:"Property is occupied by a tenant at the time of sale.", required:false },
  { code:"SIP",     name:"Seller in Possession Addendum",                        cat:"Addendum",     desc:"Governs the terms under which the seller remains in possession of the property after close of escrow. Covers rent, duration, condition of property, and liability.", when:"Seller needs to remain in the property after COE — also known as a rent-back or leaseback arrangement.", required:false },
  { code:"SPT",     name:"Notice of Supplemental Property Tax Bill",             cat:"Disclosure",   desc:"Informs the buyer that they may receive a supplemental property tax bill after close of escrow based on the reassessed value of the property. Not a tax bill itself — a notice that one is coming.", when:"All residential purchases. Buyer should receive this as part of their disclosure package so they're not blindsided by a post-COE tax bill.", required:false },
  { code:"AAA",     name:"Additional Agent Acknowledgment",                      cat:"Agency",       desc:"Documents the acknowledgment and disclosure of additional agents involved in a transaction beyond the primary listing and buyer's agents — such as a referring agent or team member with a role in the deal.", when:"Additional agents or team members are involved in the transaction and need to be formally acknowledged.", required:false },

  // CANCELLATION
  { code:"CC",      name:"Cancellation of Contract",                             cat:"Cancellation",  desc:"Formal cancellation of the purchase agreement by mutual consent. Includes deposit release instructions and direction to escrow.", when:"Either party is canceling the transaction. Triggers escrow deposit dispute resolution if parties disagree on release of deposit.", required:false },
];

const CATS = [...new Set(FORMS.map(f => f.cat))].sort();
const CAT_COLORS = {
  Purchase:"#1c7cad", Negotiation:"#7c5cad", Disclosure:"#2e8a59",
  Contingency:"#b87c2a", Cancellation:"#c0392b", Inspection:"#16a085",
  Agency:"#6d3fad", Addendum:"#555e6e", Listing:"#2471a3"
};

let activecat = "All", query = "";

function render() {
  const filtered = FORMS.filter(f => {
    const matchCat = activecat === "All" || f.cat === activecat;
    const q = query.toLowerCase();
    const matchQ = !q || [f.code, f.name, f.desc, f.when, f.cat].some(s => s.toLowerCase().includes(q));
    return matchCat && matchQ;
  });
  document.getElementById("stats").textContent = `Showing ${filtered.length} of ${FORMS.length} forms`;
  const grid = document.getElementById("grid");
  if (!filtered.length) { grid.innerHTML = `<div class="no-results">No forms match. Try a different search term or clear the filter.</div>`; return; }
  grid.innerHTML = filtered.map(f => {
    const color = CAT_COLORS[f.cat] || "#888";
    return `<div class="form-card">
      <div class="card-top">
        <span class="form-code">${f.code}</span>
        <span class="cat-badge" style="background:${color}18;color:${color}">${f.cat}</span>
      </div>
      <div class="form-name">${f.name}</div>
      <div class="form-desc">${f.desc}</div>
      <div class="when-label">When to use</div>
      <div class="when-text">${f.when}</div>
      <span class="required-tag ${f.required ? 'req-yes' : 'req-no'}">${f.required ? 'Required' : 'Situational'}</span>
    </div>`;
  }).join("");
}

function buildFilters() {
  const row = document.getElementById("filters");
  row.innerHTML = ["All", ...CATS].map(c =>
    `<span class="pill${c === activecat ? ' active' : ''}" data-cat="${c}">${c}</span>`
  ).join("");
  row.querySelectorAll(".pill").forEach(p => p.addEventListener("click", () => {
    activecat = p.dataset.cat; buildFilters(); render();
  }));
}

document.getElementById("search").addEventListener("input", e => { query = e.target.value; render(); });
buildFilters();
render();
</script>
</body>
</html>
