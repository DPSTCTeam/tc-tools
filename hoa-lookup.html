<style>
  :root {
    --blue: #1c7cad;
    --blue-dark: #145f87;
    --blue-light: #e8f4fb;
    --text: #1a1a1a;
    --text-secondary: #5a6472;
    --text-muted: #8a9099;
    --border: #e2e6ea;
    --bg: #f5f7f9;
    --surface: #ffffff;
    --radius: 10px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; position: sticky; top: 0; z-index: 100; }
  .brand-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--blue); display: inline-block; margin-right: 8px; }
  .brand-name { font-size: 15px; font-weight: 600; }
  .brand-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .back-link { font-size: 13px; color: var(--blue); text-decoration: none; }
  .back-link:hover { text-decoration: underline; }

  .page-hero { background: linear-gradient(135deg, #1c7cad 0%, #155f87 100%); color: white; padding: 2.5rem 2rem 2rem; }
  .hero-title { font-size: 26px; font-weight: 600; margin-bottom: 6px; }
  .hero-sub { font-size: 14px; opacity: 0.8; }

  .controls { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .search-wrap { position: relative; flex: 1; min-width: 220px; }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
  .search-wrap input { width: 100%; padding: 9px 12px 9px 36px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: var(--font); background: var(--bg); color: var(--text); outline: none; }
  .search-wrap input:focus { border-color: var(--blue); background: white; }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .pill { font-size: 12px; padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); color: var(--text-secondary); cursor: pointer; transition: all 0.15s; font-family: var(--font); white-space: nowrap; }
  .pill:hover { border-color: var(--blue); color: var(--blue); }
  .pill.active { background: var(--blue); border-color: var(--blue); color: white; }

  .container { max-width: 1200px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }
  .meta-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
  .stats { font-size: 12px; color: var(--text-muted); }
  .caveat { font-size: 11px; background: #fff8e1; border: 1px solid #ffe082; color: #7c5c00; padding: 6px 12px; border-radius: 6px; }

  table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); font-size: 13px; }
  thead th { background: var(--bg); font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; cursor: pointer; user-select: none; }
  thead th:hover { color: var(--blue); }
  thead th .sort-icon { font-size: 10px; margin-left: 4px; opacity: 0.5; }
  thead th.sorted .sort-icon { opacity: 1; color: var(--blue); }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #fafbfc; }
  tbody td { padding: 10px 14px; vertical-align: top; color: var(--text); }
  .td-subdivision { font-weight: 500; color: var(--text); min-width: 160px; }
  .td-area { color: var(--text-secondary); min-width: 140px; }
  .td-mgmt { color: var(--text-secondary); min-width: 160px; }
  .td-phone { font-family: var(--mono); font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
  .td-phone a { color: var(--blue); text-decoration: none; }
  .td-phone a:hover { text-decoration: underline; }
  .na-tag { font-size: 11px; color: var(--text-muted); font-style: italic; }
  .area-badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 8px; background: var(--blue-light); color: var(--blue-dark); font-weight: 500; white-space: nowrap; }

  .no-results { text-align: center; padding: 4rem 1rem; color: var(--text-muted); font-size: 14px; }

  @media print {
    header { position: static; }
    .controls { display: none; }
    .page-hero { background: #1c7cad !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    table { font-size: 10px; }
    tbody td { padding: 5px 8px; }
    thead th { padding: 6px 8px; }
    .caveat { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
  @media (max-width: 768px) {
    header, .controls, .container { padding-left: 1rem; padding-right: 1rem; }
    .page-hero { padding: 1.5rem 1rem; }
    table { font-size: 12px; }
    .td-mgmt { display: none; }
  }
</style>

// Unique area list from data
const AREA_LABELS = [...new Set(DATA.map(r => r[1]))].sort((a,b) => {
  const na = parseInt(a); const nb = parseInt(b);
  return na - nb;
});

let query = "";
let activeArea = "All";
let sortCol = 0;
let sortDir = 1;

function getFiltered() {
  const q = query.toLowerCase();
  return DATA.filter(r => {
    const matchArea = activeArea === "All" || r[1] === activeArea;
    const matchQ = !q || r.some(cell => cell.toLowerCase().includes(q));
    return matchArea && matchQ;
  }).sort((a, b) => {
    const av = a[sortCol].toLowerCase();
    const bv = b[sortCol].toLowerCase();
    return av < bv ? -sortDir : av > bv ? sortDir : 0;
  });
}

function render() {
  const filtered = getFiltered();
  document.getElementById("stats").textContent = `Showing ${filtered.length} of ${DATA.length} subdivisions`;

  const cols = ["Subdivision", "Area", "Management Co.", "Address", "Phone"];
  const wrap = document.getElementById("table-wrap");

  if (!filtered.length) {
    wrap.innerHTML = `<div class="no-results">No results match your search. Try a different term or clear filters.</div>`;
    return;
  }

  const thead = cols.map((c, i) => {
    const sorted = sortCol === i;
    const icon = sorted ? (sortDir === 1 ? "↑" : "↓") : "↕";
    return `<th class="${sorted?'sorted':''}" onclick="setSort(${i})">${c} <span class="sort-icon">${icon}</span></th>`;
  }).join("");

  const tbody = filtered.map(r => {
    const phone = r[4] === "N/A" ? `<span class="na-tag">N/A</span>` : `<a href="tel:${r[4].replace(/\D/g,'')}">${r[4]}</a>`;
    return `<tr>
      <td class="td-subdivision">${r[0]}</td>
      <td class="td-area"><span class="area-badge">${r[1]}</span></td>
      <td class="td-mgmt">${r[2]}</td>
      <td style="font-size:12px;color:var(--text-secondary)">${r[3]}</td>
      <td class="td-phone">${phone}</td>
    </tr>`;
  }).join("");

  wrap.innerHTML = `<table><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>`;
}

function buildFilters() {
  const row = document.getElementById("filters");
  const all = ["All", ...AREA_LABELS];
  row.innerHTML = all.map(a => {
    const label = a === "All" ? "All" : a.split(" - ")[1] || a;
    return `<span class="pill${a===activeArea?' active':''}" data-area="${a}" title="${a}">${label}</span>`;
  }).join("");
  row.querySelectorAll(".pill").forEach(p => p.addEventListener("click", () => {
    activeArea = p.dataset.area; buildFilters(); render();
  }));
}

function setSort(col) {
  if (sortCol === col) sortDir = -sortDir;
  else { sortCol = col; sortDir = 1; }
  render();
}

document.getElementById("search").addEventListener("input", e => { query = e.target.value; render(); });
buildFilters();
render();
</script>
